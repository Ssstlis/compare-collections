pull_request_rules:
  - name: Request reviews and label Steward's PRs
    conditions:
      - author=ssstlis-bot[bot]
    actions:
      request_reviews:
        users: [Ssstlis]
      label:
        add: [dependency-update]

  - name: Merge Steward's PRs
    conditions:
      - author=ssstlis-bot[bot]
      - or:
          - and:
              - "#files=1"
              - or:
                  - files=project/build.properties
                  - files=project/plugins.sbt
          - body~=labels:.*semver-patch
          - "#approved-reviews-by>=1"
      - and:
          - check-success~=Test
    actions:
      merge:
        method: rebase

  - name: Label conflicting pull requests
    description: Add a label to a pull request with conflict to spot it easily
    conditions:
      - conflict
      - -closed
    actions:
      label:
        toggle:
          - conflict

  - name: Ping PR author when conflicting
    description: Warn the pull request author when their PR are conflicting
    conditions:
      - conflict
      - -closed
    actions:
      comment:
        message: |
          👋 {{author}} your PR is conflicting and needs to be updated to be merged

merge_protections_settings:
  reporting_method: check-runs
